<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Eco-Friendly Travel Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">EcoTravel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="eco-options.html">Eco Options</a></li>
          <li class="nav-item"><a class="nav-link" href="itinerary.html">Itinerary</a></li>
          <li class="nav-item"><a class="nav-link" href="weather.html">Weather</a></li>
          <li class="nav-item"><a class="nav-link" href="calculator.html">Calculator</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow">
          <div class="card-body p-4 p-md-5">
            <h2 class="card-title text-center mb-4">Welcome Back</h2>

            <form id="loginForm" novalidate>

              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="jane@example.com" required>
                <div class="invalid-feedback" id="emailError">Please enter a valid email address.</div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Your password" required>
                <div class="invalid-feedback" id="passwordError">Password is required.</div>
              </div>

              <button type="submit" class="btn btn-lg w-100" style="background-color: var(--green-primary); color: var(--white);">Login</button>

            </form>

            <p class="text-center mt-4 mb-0">
              Don't have an account? <a href="register.html" style="color: var(--green-primary);">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p class="mb-0">&copy; 2026 Eco-Friendly Travel Planner &mdash; WIF2003 Web Programming</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let valid = true;

      // Reset state
      [email, password].forEach(function (el) {
        el.classList.remove('is-invalid', 'is-valid');
      });

      if (!emailRegex.test(email.value.trim())) {
        email.classList.add('is-invalid');
        document.getElementById('emailError').textContent = 'Please enter a valid email address.';
        valid = false;
      } else {
        email.classList.add('is-valid');
      }

      if (!password.value.trim()) {
        password.classList.add('is-invalid');
        document.getElementById('passwordError').textContent = 'Password is required.';
        valid = false;
      } else {
        password.classList.add('is-valid');
      }

      if (valid) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
